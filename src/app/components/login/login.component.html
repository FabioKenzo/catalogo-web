<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0 p-4 bg-white rounded">
        <div class="card-body">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-primary"><i class="bi bi-box-arrow-in-right me-2"></i>Acessar Conta</h2>
            <p class="text-muted">Insira suas credenciais para entrar na plataforma.</p>
          </div>

          <form>
            <div class="mb-3">
              <label class="form-label fw-bold">E-mail</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                <input type="email" [(ngModel)]="dadosLogin.email" name="email" class="form-control" placeholder="exemplo@email.com" required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Senha</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                <input type="password" [(ngModel)]="dadosLogin.senha" name="senha" class="form-control" placeholder="Digite sua senha" required>
              </div>
            </div>

            <button type="button" (click)="logar()" class="btn btn-primary w-100 py-2 fw-bold mb-3">
              Entrar
            </button>

            <div class="text-center">
              <p class="mb-0 text-muted">Não tem uma conta? <a href="/cadastro" class="text-decoration-none fw-bold">Cadastre-se</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
